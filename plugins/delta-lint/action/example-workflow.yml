# .github/workflows/delta-lint.yml
#
# Auto-scan PRs for structural contradictions.
# Supports: auto-trigger on PR + on-demand via /delta-review comment.

name: delta-lint

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    # Run on PR events, OR on /delta-review comments on PRs
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/delta-review'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # For issue_comment: checkout the PR branch, not the default branch
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || '' }}

      - name: delta-lint
        uses: karesansui-u/agi-lab-skills-marketplace/plugins/delta-lint/action@main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # --- Mode ---
          # review  : Comment only (default, for teams)
          # suggest : Comment + GitHub Suggested Changes inline
          # autofix : Auto-commit fixes to the PR branch (for solo/vibe coding)
          #
          # For /delta-review comments, mode can be overridden:
          #   /delta-review          → uses default mode below
          #   /delta-review suggest  → suggest mode
          #   /delta-review autofix  → autofix mode
          mode: "suggest"

          severity: "high"
          # model: "claude-sonnet-4-20250514"
          # max_diff_files: "20"
          # fail_on_findings: "false"
          # comment_on_clean: "false"
